<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Confetti -->
  <rect x="25" y="15" width="8" height="8" rx="1" fill="#E74C3C" transform="rotate(30 29 19)"/>
  <rect x="80" y="5" width="8" height="8" rx="1" fill="#F5A623" transform="rotate(-20 84 9)"/>
  <rect x="155" y="20" width="8" height="8" rx="1" fill="#27AE60" transform="rotate(45 159 24)"/>
  <rect x="170" y="50" width="6" height="6" rx="1" fill="#8E44AD" transform="rotate(15 173 53)"/>
  <rect x="15" y="55" width="6" height="6" rx="1" fill="#3498DB" transform="rotate(-35 18 58)"/>
  <!-- Slide character body -->
  <rect x="40" y="40" width="120" height="90" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="3"/>
  <!-- Screen with big checkmark -->
  <rect x="50" y="50" width="100" height="65" rx="4" fill="#E8F0FE"/>
  <path d="M 75 82 L 92 100 L 125 60" fill="none" stroke="#27AE60" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Happy eyes -->
  <path d="M 72 145 Q 80 138 88 145" fill="none" stroke="#2C5F8A" stroke-width="3" stroke-linecap="round"/>
  <path d="M 112 145 Q 120 138 128 145" fill="none" stroke="#2C5F8A" stroke-width="3" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M 82 158 Q 100 175 118 158" fill="none" stroke="#2C5F8A" stroke-width="3" stroke-linecap="round"/>
  <!-- Raised arms -->
  <line x1="35" y1="100" x2="15" y2="60" stroke="#4A90D9" stroke-width="8" stroke-linecap="round"/>
  <line x1="165" y1="100" x2="185" y2="60" stroke="#4A90D9" stroke-width="8" stroke-linecap="round"/>
  <!-- Sparkle on hands -->
  <circle cx="15" cy="55" r="5" fill="#F5A623"/>
  <circle cx="185" cy="55" r="5" fill="#F5A623"/>
  <!-- Feet -->
  <ellipse cx="75" cy="188" rx="18" ry="8" fill="#4A90D9"/>
  <ellipse cx="125" cy="188" rx="18" ry="8" fill="#4A90D9"/>
</svg>
