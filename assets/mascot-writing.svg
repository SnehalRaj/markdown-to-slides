<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Slide character body -->
  <rect x="40" y="30" width="120" height="90" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="3"/>
  <!-- Screen glare -->
  <rect x="50" y="40" width="100" height="65" rx="4" fill="#E8F0FE"/>
  <!-- Text lines on screen -->
  <line x1="60" y1="55" x2="110" y2="55" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="67" x2="130" y2="67" stroke="#7BB3E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="79" x2="120" y2="79" stroke="#7BB3E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="91" x2="100" y2="91" stroke="#B8D4F0" stroke-width="3" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="80" cy="135" r="5" fill="#2C5F8A"/>
  <circle cx="120" cy="135" r="5" fill="#2C5F8A"/>
  <circle cx="82" cy="133" r="2" fill="white"/>
  <circle cx="122" cy="133" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M 85 148 Q 100 160 115 148" fill="none" stroke="#2C5F8A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pencil in hand -->
  <rect x="135" y="125" width="8" height="40" rx="2" fill="#F5A623" transform="rotate(-25 139 145)"/>
  <polygon points="133,163 139,175 145,163" fill="#2C5F8A" transform="rotate(-25 139 145)"/>
  <!-- Feet -->
  <ellipse cx="75" cy="178" rx="18" ry="8" fill="#4A90D9"/>
  <ellipse cx="125" cy="178" rx="18" ry="8" fill="#4A90D9"/>
</svg>
